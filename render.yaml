services:
  - type: web
    name: civiq-backend
    runtime: native
    rootDir: backend
    buildCommand: go build -o bin/server ./cmd/server
    startCommand: ./bin/server
    healthCheckPath: /api/health
    envVars:
      - key: SOCKETIO_ENABLED
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        sync: false
